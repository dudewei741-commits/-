<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双臂灵巧手机器人学术科研 - 知识体系</title>
    <style>
        :root {
            --primary: #1a3c6e;
            --primary-light: #2c5aa0;
            --accent: #c9a84c;
            --bg: #f5f2eb;
            --white: #ffffff;
            --text: #2c2c2c;
            --text-light: #555;
            --border: #e0dcd3;
            --sidebar-bg: #fafaf7;
            --hover-bg: #eef1f6;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            --radius: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            background: #eae7df;
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ==================== 顶部导航栏 ==================== */
        .top-bar {
            background: var(--white);
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.06);
            position: sticky;
            top: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            padding: 0 28px;
            height: 60px;
            gap: 16px;
        }
        .top-bar .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            flex-shrink: 0;
            text-decoration: none;
        }
        .top-bar .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }
        .top-bar .title-main {
            font-size: 17px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .top-bar .title-sub {
            font-size: 11px;
            color: #888;
            white-space: nowrap;
        }
        .top-bar .breadcrumb-nav {
            margin-left: auto;
            font-size: 13px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .top-bar .breadcrumb-nav a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }
        .top-bar .breadcrumb-nav a:hover {
            color: var(--accent);
            text-decoration: underline;
        }
        .top-bar .breadcrumb-nav .sep {
            color: #ccc;
        }
        .top-bar .breadcrumb-nav .current {
            color: #555;
            font-weight: 600;
        }
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--primary);
            padding: 4px 8px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        /* ==================== 主布局 ==================== */
        .main-container {
            display: flex;
            flex: 1;
            max-width: 1500px;
            width: 100%;
            margin: 0 auto;
            min-height: calc(100vh - 60px);
        }
        /* 侧边栏（仅子页面显示） */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            position: sticky;
            top: 60px;
            height: calc(100vh - 60px);
            padding: 16px 0;
            transition: var(--transition);
            z-index: 50;
            flex-shrink: 0;
        }
        .sidebar.hidden {
            display: none;
        }
        .sidebar .sidebar-title {
            font-weight: 700;
            font-size: 13px;
            color: var(--primary);
            padding: 8px 18px 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar .sidebar-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 15px;
            background: var(--accent);
            border-radius: 2px;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar li a {
            display: block;
            padding: 5px 18px 5px 18px;
            text-decoration: none;
            color: #444;
            font-size: 12px;
            transition: var(--transition);
            border-left: 3px solid transparent;
            line-height: 1.4;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar li a:hover,
        .sidebar li a.active-nav {
            background: var(--hover-bg);
            color: var(--primary-light);
            border-left-color: var(--accent);
            font-weight: 600;
        }
        .sidebar li a.level-h2 {
            font-weight: 700;
            font-size: 13px;
            color: var(--primary);
            padding-left: 14px;
        }
        .sidebar li a.level-h3 {
            padding-left: 30px;
            font-weight: 500;
            font-size: 12px;
            color: #333;
        }
        .sidebar li a.level-h4 {
            padding-left: 46px;
            font-size: 11px;
            color: #666;
        }

        /* 内容区 */
        .content {
            flex: 1;
            padding: 28px 36px;
            overflow-y: auto;
            max-width: 1100px;
            background: #fdfdfc;
            min-height: calc(100vh - 60px);
            transition: var(--transition);
        }
        .content.full-width {
            max-width: 100%;
            padding: 40px 48px;
        }

        /* ==================== 主页卡片样式 ==================== */
        .home-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            padding: 40px 20px;
        }
        .home-container .home-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .home-container .home-subtitle {
            font-size: 14px;
            color: #888;
            text-align: center;
            margin-bottom: 36px;
            letter-spacing: 0.5px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1100px;
        }
        .card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 28px 22px;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }
        .card .card-icon {
            font-size: 42px;
            margin-bottom: 14px;
            display: block;
        }
        .card .card-num {
            font-size: 12px;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .card .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .card .card-desc {
            font-size: 13px;
            color: #777;
            line-height: 1.5;
        }
        .card::after {
            content: '点击进入 →';
            display: block;
            margin-top: 14px;
            font-size: 12px;
            color: var(--primary-light);
            font-weight: 600;
            opacity: 0;
            transition: var(--transition);
            transform: translateY(6px);
        }
        .card:hover::after {
            opacity: 1;
            transform: translateY(0);
        }

        /* ==================== 章节内容样式 ==================== */
        .section-block {
            background: var(--white);
            border-radius: var(--radius);
            padding: 22px 26px;
            margin-bottom: 18px;
            box-shadow: var(--shadow);
            border: 1px solid #eee;
            transition: var(--transition);
        }
        .section-block:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .section-block h2 {
            font-size: 19px;
            color: var(--primary);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 9px;
            margin-bottom: 14px;
            letter-spacing: 0.4px;
        }
        .section-block h3 {
            font-size: 16px;
            color: #2c4a7c;
            margin: 16px 0 9px;
            padding-left: 10px;
            border-left: 4px solid var(--accent);
            letter-spacing: 0.3px;
        }
        .section-block h4 {
            font-size: 14px;
            color: #3a5a8c;
            margin: 12px 0 7px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        .section-block h4::before {
            content: '▸ ';
            color: var(--accent);
            font-size: 12px;
        }
        .section-block .core-position {
            background: #fdf8ed;
            border-left: 4px solid var(--accent);
            padding: 9px 14px;
            border-radius: 0 var(--radius) var(--radius) 0;
            margin: 9px 0 14px;
            font-size: 13px;
            color: #6b5a30;
            font-style: italic;
        }
        .section-block ul,
        .section-block ol {
            margin: 5px 0 9px 18px;
            padding: 0;
        }
        .section-block li {
            margin: 3px 0;
            font-size: 13px;
            color: #444;
            line-height: 1.6;
            padding-left: 2px;
        }
        .section-block p {
            font-size: 13px;
            color: #444;
            line-height: 1.7;
            margin: 4px 0;
        }
        .section-block b {
            color: #2c2c2c;
        }
        .section-block .highlight-box {
            background: #f7f9fc;
            border: 1px solid #e0e5ec;
            border-radius: var(--radius);
            padding: 12px 16px;
            margin: 9px 0;
            font-size: 13px;
        }
        .back-to-home {
            display: inline-block;
            margin-bottom: 16px;
            padding: 8px 18px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: var(--transition);
            text-decoration: none;
        }
        .back-to-home:hover {
            background: var(--primary-light);
            box-shadow: var(--shadow);
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 60px;
                z-index: 150;
                box-shadow: 4px 0 20px rgba(0, 0, 0, 0.2);
                transform: translateX(0);
                width: 280px;
                min-width: 280px;
                transition: transform 0.3s ease;
            }
            .sidebar.collapsed {
                transform: translateX(-100%);
            }
            .menu-toggle {
                display: block;
            }
            .content {
                padding: 14px 10px;
                max-width: 100%;
            }
            .content.full-width {
                padding: 20px 12px;
            }
            .section-block {
                padding: 14px 10px;
            }
            .section-block h2 {
                font-size: 16px;
            }
            .section-block h3 {
                font-size: 14px;
            }
            .section-block h4 {
                font-size: 12px;
            }
            .card-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .home-container .home-title {
                font-size: 22px;
            }
            .top-bar .title-main {
                font-size: 14px;
            }
            .top-bar .breadcrumb-nav {
                font-size: 11px;
            }
        }
        @media print {
            .sidebar,
            .top-bar,
            .back-to-home {
                display: none;
            }
            .content {
                max-width: 100%;
                padding: 0;
            }
            .section-block {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }
        }
        .sidebar::-webkit-scrollbar,
        .content::-webkit-scrollbar {
            width: 5px;
        }
        .sidebar::-webkit-scrollbar-thumb,
        .content::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- ==================== 顶部导航栏 ==================== -->
    <header class="top-bar" id="topBar">
        <button class="menu-toggle" id="menuToggle" title="切换侧边栏">☰</button>
        <a class="logo-area" id="logoLink" title="返回首页">
            <div class="logo-icon">🤖</div>
            <div>
                <div class="title-main">双臂灵巧手机器人</div>
                <div class="title-sub">学术科研知识体系</div>
            </div>
        </a>
        <nav class="breadcrumb-nav" id="breadcrumb">
            <span class="current">首页</span>
        </nav>
    </header>

    <!-- ==================== 主布局 ==================== -->
    <div class="main-container">
        <!-- 侧边栏（子页面时显示） -->
        <aside class="sidebar hidden" id="sidebar">
            <div class="sidebar-title" id="sidebarTitle">目录导航</div>
            <ul id="sidebarNav"></ul>
        </aside>

        <!-- 内容区 -->
        <main class="content full-width" id="mainContent">
            <!-- 主页内容 -->
            <div id="page-home" class="home-container">
                <div class="home-title">双臂灵巧手机器人学术科研</div>
                <div class="home-subtitle">系统化知识体系 · 四大核心模块</div>
                <div class="card-grid">
                    <!-- 卡片1 -->
                    <a class="card" data-page="page-1" onclick="navigateTo('page-1', '一、机械结构与硬件系统')">
                        <span class="card-icon">⚙️</span>
                        <div class="card-num">第一部分</div>
                        <div class="card-title">机械结构与硬件系统</div>
                        <div class="card-desc">机构设计 · 驱动致动 · 硬件集成 · 材料科学</div>
                    </a>
                    <!-- 卡片2 -->
                    <a class="card" data-page="page-2" onclick="navigateTo('page-2', '二、感知系统')">
                        <span class="card-icon">👁️</span>
                        <div class="card-num">第二部分</div>
                        <div class="card-title">感知系统</div>
                        <div class="card-desc">视觉感知 · 非视觉感知 · 传感器融合 · 感知可靠性</div>
                    </a>
                    <!-- 卡片3 -->
                    <a class="card" data-page="page-3" onclick="navigateTo('page-3', '三、决策与控制系统')">
                        <span class="card-icon">🧠</span>
                        <div class="card-num">第三部分</div>
                        <div class="card-title">决策与控制系统</div>
                        <div class="card-desc">运动规划 · 控制理论 · AI学习 · 认知推理</div>
                    </a>
                    <!-- 卡片4 -->
                    <a class="card" data-page="page-4" onclick="navigateTo('page-4', '四、交互与协同系统')">
                        <span class="card-icon">🤝</span>
                        <div class="card-num">第四部分</div>
                        <div class="card-title">交互与协同系统</div>
                        <div class="card-desc">人机交互 · 多机器人协同 · 环境交互</div>
                    </a>
                </div>
            </div>

            <!-- ==================== 子页面容器 ==================== -->
            <div id="page-1" style="display:none;"></div>
            <div id="page-2" style="display:none;"></div>
            <div id="page-3" style="display:none;"></div>
            <div id="page-4" style="display:none;"></div>
        </main>
    </div>

    <script>
        // ==================== 页面数据 ====================
        // 所有子页面的HTML内容存储在这里
        const pageContents = {};

        // ---- 页面1：机械结构与硬件系统 ----
        pageContents['page-1'] = `
            <button class="back-to-home" onclick="navigateTo('page-home','首页')">← 返回首页</button>
            <div class="section-block" id="sec-1-0">
                <h2>一、机械结构与硬件系统</h2>
            </div>
            <div class="section-block" id="sec-1-1">
                <h2>1 机械结构设计</h2>
                <h3>1.1 基础机构学与构型设计理论</h3>
                <p class="core-position">核心定位：解决「机器人该有什么样的运动形态」的底层理论问题，是所有结构设计的源头</p>
                <h4>1.1.1 机构拓扑与自由度综合</h4>
                <p><b>(1)核心研究内容</b></p><p>基于旋量理论、李群李代数、图论等数学工具，开展串联／并联/混联机构的型综合、数综合、自由度分析，设计满足特定运动需求（如高精度、大负载、高灵活性）的机构构型</p>
                <p><b>(2)前沿学术热点</b></p><p>少自由度并联机构的完整构型综合理论（解决传统并联机构自由度余、运动耦合问题）混联机构的构型创新（如人形机器人的混联踝关节、加工机器人的混联主轴头）基于生成式AI的机构构型自动综合（用大模型、强化学习生成满足需求的新型机构）</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 数学（拓扑学、优化理论）、机械 × AI（生成式设计）</p>
                <p><b>(4)代表研究</b></p><p>清华大学「混联加工机器人」构型、MIT「人形机器人并联关节设计」，顶刊《Mechanism and Machine Theory》、顶会ICRA/IROS</p>
                <h4>1.1.2 变胞／可重构机构理论</h4>
                <p><b>(1)核心研究内容</b></p><p>研究可改变自由度、构型、运动特性的变胞机构，以及可重构模块化机构的拓扑演化规律、运动学／动力学建模、构型切换机理。</p>
                <p><b>(2)前沿学术热点</b></p><p>变胞机构的拓扑综合与运动控制一体化设计 自重构模块化机器人的自动拼接与构型自适应 折纸／剪纸（Origami/Kirigami）启发的变胞机构设计</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 材料（超材料折纸结构）、机械 × 控制（构型切换控制）</p>
                <p><b>(4)代表研究</b></p><p>洛桑联邦理工「折纸可展开机器人」</p>
                <h4>1.1.3 余自由度机构设计与优化</h4>
                <p><b>(1)核心研究内容</b></p><p>针对7自由度机械臂、余度人形机器人等，开展余度分配、避障、容错、轨迹优化的结构设计，解决高灵活性与控制复杂度的矛盾。</p>
                <p><b>(2)前沿学术热点</b></p><p>冗余度机器人的全局运动学优化（兼顾灵活性、避障、能耗）冗余关节的容错结构设计（单关节故障下仍可完成任务）冗余度与柔顺控制结合的结构优化</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 控制（余度控制）、机械 × 优化理论</p>
                <p><b>(4)代表研究</b></p><p>NASA「7自由度空间机械臂」、波士顿动力「Atlas余关节设计」</p>
                <h4>1.1.4 机构运动学/动力学精准建模</h4>
                <p><b>(1)核心研究内容</b></p><p>建立机器人机构的正逆运动学、刚柔耦合多体动力学、摩擦力动力学模型，开展参数辨识、误差补偿、动态特性分析。</p>
                <p><b>(2)前沿学术热点</b></p><p>刚柔耦合动力学的高精度建模（针对高速、柔性机器人）数字孪生驱动的机构参数实时辨识与优化不确定性环境下的机构动力学鲁棒建模</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 力学（多体动力学）、机械 × AI（数字孪生、参数辨识）</p>
                <p><b>(4)代表研究</b></p><p>上海交通大学「机器人刚柔耦合动力学」</p>
            </div>
            <div class="section-block" id="sec-1-2">
                <h3>1.2 轻量化与高刚度结构优化</h3>
                <p class="core-position">核心定位：解决「机器人结构轻、刚度高、动态性能好」的工程核心矛盾，是工业、人形、移动机器人的共性需求</p>
                <h4>1.2.1 拓扑优化与多目标性能优化</h4>
                <p><b>(1)核心研究内容</b></p><p>基于变密度法、水平集法、渐进结构优化法等，开展机械臂连杆、关节壳体、移动机器人车架等结构的拓扑优化，实现轻量化与高刚度的平衡。</p>
                <p><b>(2)前沿学术热点</b></p><p>增材制造导向的拓扑优化（考虑3D打印工艺约束，设计复杂点阵／晶格结构）多目标拓扑优化（同时优化刚度、重量、振动、热性能、可靠性）生成式AI辅助拓扑优化（用大模型快速生成最优结构拓扑）</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 材料（增材制造材料）、机械 × AI（生成式设计）</p>
                <p><b>(4)代表研究</b></p><p>MIT「拓扑优化人形机器人骨骼」、华中科技大学「增材制造机器人结构」，顶刊《Structural and Multidisciplinary Optimization》</p>
                <h4>1.2.2 刚柔耦合结构设计</h4>
                <p><b>(1)核心研究内容</b></p><p>设计刚柔混合结构，融合刚性结构的高精度与柔性结构的高适应性，解决高速、重载机器人的振动、冲击问题。</p>
                <p><b>(2)前沿学术热点</b></p><p>柔性连杆／关节的结构设计与柔顺控制一体化刚柔耦合结构的动力学精准建模与振动抑制柔性机构的力感知结构设计（用于协作机器人）</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 控制（柔顺控制）、机械 × 力学（弹性力学）</p>
                <p><b>(4)代表研究</b></p><p>Universal Robots「协作机器人柔性关节」，顶会ICRA</p>
                <h4>1.2.3 振动抑制与动态特性优化</h4>
                <p><b>(1)核心研究内容</b></p><p>优化结构的固有频率、阻尼比，避免共振，提升机器人的定位精度与运动平稳性。</p>
                <p><b>(2)前沿学术热点</b></p><p>超材料阻尼结构设计（用超材料实现宽频振动抑制）主动振动抑制的结构集成（内置压电作动器、传感器的结构）高速机器人的结构动态特性全局优化</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 材料（超材料）、机械 × 控制（主动控制）</p>
                <p><b>(4)代表研究</b></p><p>Metamaterial robotics，顶刊《Science Robotics》</p>
                <h4>1.2.4 热-结构耦合优化</h4>
                <p><b>(1)核心研究内容</b></p><p>针对高负载、高速机器人的关节发热问题，开展热结构耦合分析，设计散热结构、隔热结构，抑制热变形对精度的影响。</p>
                <p><b>(2)前沿学术热点</b></p><p>相变材料集成的关节散热结构设计热误差补偿与结构设计一体化优化极端环境下的热结构耦合设计（如航天、工业机器人）</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 热力学、机械 × 材料（相变材料）</p>
                <p><b>(4)代表研究</b></p><p>发那科「工业机器人热结构优化」，顶刊《Robotics and Computer-Integrated Manufacturing》</p>
            </div>
            <div class="section-block" id="sec-1-3">
                <h3>1.3 仿生与生物启发式结构设计（前沿交叉热点，具身智能核心载体）</h3>
                <p class="core-position">核心定位：模仿生物的结构、运动、感知机理，突破传统刚性机器人的性能边界，是具身智能机器人的核心结构支撑</p>
                <h4>1.3.1 生物形态仿生结构设计</h4>
                <p><b>(1)核心研究内容</b></p><p>模仿人、动物、昆虫等生物的躯体结构，设计仿人机器人骨骼、四足／六足机器人腿部、仿生柔性臂等结构。</p>
                <p><b>(2)前沿学术热点</b></p><p>仿人肌肉－骨骼耦合结构设计（人形机器人的脊柱、髋关节、肌肉驱动骨骼）仿生连续体／软体机器人结构（仿章鱼臂、仿生蠕虫结构）仿生扑翼／游动机器人结构（仿鸟类、鱼类的高效运动结构）</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 生物医学（人体解剖学、生物力学）、机械 × 材料（柔性材料）</p>
                <p><b>(4)代表研究</b></p><p>波士顿动力「Atlas仿人骨骼结构」斯坦福大学「仿章鱼柔性臂」，顶刊《Nature》</p>
                <h4>1.3.2 柔性／软体机器人结构设计</h4>
                <p><b>(1)核心研究内容</b></p><p>设计基于柔性材料、绳驱、气动、磁控的软体机器人结构，实现非结构化环境的高适应性交互。</p>
                <p><b>(2)前沿学术热点</b></p><p>多材料3D打印的软体机器人结构（功能梯度材料、柔性－刚性混合结构）磁控／光控柔性机器人的结构设计（微纳尺度、医疗场景）柔性机器人的力感知结构集成（仿生皮肤、触觉传感器）</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 材料（柔性电子、水凝胶）、机械 × 生物医学（医疗机器人）</p>
                <p><b>(4)代表研究</b></p><p>哈佛大学「软体机器人」，顶刊《Science Robotics》</p>
                <h4>1.3.3 感知－结构一体化仿生设计</h4>
                <p><b>(1)核心研究内容</b></p><p>将传感器、作动器直接集成到机器人结构中，实现「结构即感知、结构即驱动」，突破传统「结构+传感器」的分离式架构。</p>
                <p><b>(2)前沿学术热点</b></p><p>柔性电子皮肤的结构集成（服务机器人、医疗机器人）自感知复合材料结构（内置光纤、压电传感器的结构）超材料感知结构（用超材料实现环境感知、力感知）</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 电子（柔性电子）、机械 × 材料（智能复合材料）</p>
                <p><b>(4)代表研究</b></p><p>斯坦福大学「电子皮肤机器人」，顶刊《Nature Electronics》</p>
                <h4>1.3.4 生物运动机理仿生结构</h4>
                <p><b>(1)核心研究内容</b></p><p>模仿生物的运动原理（如肌肉驱动、蠕动、飞行、游动），设计高效、高适应性的机器人结构。</p>
                <p><b>(2)前沿学术热点</b></p><p>仿生肌肉驱动结构（气动人工肌肉、形状记忆合金肌肉）仿生蠕动机器人的柔性结构设计（医疗、管道机器人）扑翼机器人的高效气动结构设计（微型飞行器）</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 生物力学、机械 × 流体力学</p>
                <p><b>(4)代表研究</b></p><p>MIT「仿生扑翼机器人」，顶刊《Science》</p>
            </div>
            <div class="section-block" id="sec-1-4">
                <h3>1.4 可重构／模块化／可展开结构设计（特种场景核心方向）</h3>
                <p class="core-position">核心定位：解决「机器人适应多任务、多场景、极端环境」的结构需求，用于空间探索、灾难救援、可穿戴等场景</p>
                <h4>1.4.1 模块化机器人结构设计</h4>
                <p><b>(1)核心研究内容</b></p><p>设计标准化、可互换的机器人模块，快速拼接成不同构型的机器人，适应不同任务需求。</p>
                <p><b>(2)前沿学术热点</b></p><p>自重构模块化机器人（自动拼接、自主变形，用于灾难救援）模块化人形机器人的结构设计（快速更换关节、末端执行器）模块化工业机器人的柔性生产线适配</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 控制（自重构控制）、机械 × AI（构型自动规划）</p>
                <p><b>(4)代表研究</b></p><p>CMU「自重构模块化机器人」、哈尔滨工业大学「空间模块化机械臂」</p>
                <h4>1.4.2 可展开/折叠结构设计</h4>
                <p><b>(1)核心研究内容</b></p><p>设计可折叠、可展开的机器人结构，解决运输空间受限、部署需求，用于空间机器人、可穿戴机器人、救援机器人。</p>
                <p><b>(2)前沿学术热点</b></p><p>折纸／剪纸启发的可展开结构空间机器人的大型可展开机械臂、天线结构可穿戴外骨骼的折叠式结构设计</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 材料（超材料）、机械 × 航空航天（空间技术）</p>
                <p><b>(4)代表研究</b></p><p>NASA「空间可展开机械臂」，顶刊《Nature Communications》</p>
                <h4>1.4.3 变构型/多模态机器人结构设计</h4>
                <p><b>(1)核心研究内容</b></p><p>设计可切换构型的机器人结构，实现多模态运动（如轮－腿复合、水－陆两栖、飞－行复合），适应非结构化环境。</p>
                <p><b>(2)前沿学术热点</b></p><p>轮腿复合机器人的变构型关节设计（可切换轮式／腿式运动）水陆两栖机器人的可变形结构设计飞行-行走复合机器人的结构设计</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 流体力学、机械 × 控制（模态切换控制）</p>
                <p><b>(4)代表研究</b></p><p>波士顿动力「Handle轮腿机器人」、MIT「水陆两栖机器人」</p>
                <h4>1.4.4 可穿戴机器人（外骨骼）结构设计</h4>
                <p><b>(1)核心研究内容</b></p><p>设计贴合人体关节、轻量化、高适配性的外骨骼结构，用于康复、助力、工业防护。</p>
                <p><b>(2)前沿学术热点</b></p><p>柔性外骨骼的结构设计（无刚性连杆，贴合人体运动）人机耦合的结构优化（适配不同体型、运动姿态）康复外骨骼的力感知结构集成</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 生物医学（人体工学、康复医学）、机械 × 控制（人机协同控制）</p>
                <p><b>(4)代表研究</b></p><p>本田「步行辅助外骨骼」，顶刊《IEEE Transactions on Neural Systems and Rehabilitation Engineering》</p>
            </div>
            <div class="section-block" id="sec-1-5">
                <h3>1.5 先进制造与智能集成结构设计</h3>
                <p class="core-position">核心定位：结合先进制造技术、人工智能、新材料，实现结构设计的智能化、一体化、定制化</p>
                <h4>1.5.1 增材制造（3D打印）导向的结构设计</h4>
                <p><b>(1)核心研究内容</b></p><p>针对金属3D打印、多材料3D打印、连续纤维增强3D打印等工艺，设计复杂拓扑、点阵／晶格、功能梯度的机器人结构。</p>
                <p><b>(2)前沿学术热点</b></p><p>多材料3D打印的柔性－刚性混合机器人结构连续纤维增强复合材料的机器人结构设计（轻量化、高刚度）4D打印的智能变形结构设计（响应环境刺激的结构）</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 材料（增材制造材料）、机械 × 制造工程</p>
                <p><b>(4)代表研究</b></p><p>哈佛大学「4D打印软体机器人」，顶刊《Science Advances》</p>
                <h4>1.5.2 功能结构一体化设计</h4>
                <p><b>(1)核心研究内容</b></p><p>将驱动、传感、控制、能源等功能直接集成到机器人结构中，实现「结构即系统」，突破传统模块化集成的瓶颈。</p>
                <p><b>(2)前沿学术热点</b></p><p>超材料功能一体化结构（同时实现结构支撑、驱动、感知）自供电机器人结构（集成能量收集材料的结构）自修复结构（集成自修复材料的机器人结构）</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 材料（智能材料、超材料）、机械 × 能源（能量收集）</p>
                <p><b>(4)代表研究</b></p><p>洛桑联邦理工「超材料机器人」，顶刊《Science Robotics》</p>
                <h4>1.5.3 微纳机器人结构设计</h4>
                <p><b>(1)核心研究内容</b></p><p>针对微纳尺度（微米／纳米级）的机器人，设计MEMS/NEMS结构、磁控／光控结构，用于医疗、生物操作、芯片制造。</p>
                <p><b>(2)前沿学术热点</b></p><p>磁控微纳机器人的结构设计（细胞操作、药物递送）微纳操作机器人的精密结构设计（芯片制造、生物实验）群智能微纳机器人的结构设计</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × MEMS/NEMS、机械 × 生物医学</p>
                <p><b>(4)代表研究</b></p><p>康奈尔大学「微纳机器人」，顶刊《Nature Nanotechnology》</p>
                <h4>1.5.4 数字孪生驱动的全生命周期结构设计</h4>
                <p><b>(1)核心研究内容</b></p><p>基于数字孪生技术，在虚拟环境中完成结构设计、仿真、优化、验证，再进行物理制造，实现结构全生命周期的闭环优化。</p>
                <p><b>(2)前沿学术热点</b></p><p>数字孪生驱动的结构设计－制造－运维一体化基于数字孪生的结构健康监测与寿命预测AI辅助的数字孪生结构优化</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × AI（数字孪生、大模型）、机械 × 可靠性工程</p>
                <p><b>(4)代表研究</b></p><p>西门子「数字孪生机器人」，顶刊《IEEE Transactions on Industrial Informatics》</p>
            </div>
            <div class="section-block" id="sec-1-6">
                <h3>1.6 机器人本体装配工艺与集成技术</h3>
                <p class="core-position">核心定位：解决「机器人从零件到整机的高精度、高效率集成」问题，是保证机器人性能一致性与可靠性的核心工程环节</p>
                <h4>1.6.1 精密机械装配工艺与公差分配优化</h4>
                <p><b>(1)核心研究内容</b></p><p>针对机器人高精度关节、传动系统、整机装配，开展装配工艺规划、公差分析与分配优化，实现装配精度与制造成本的平衡。</p>
                <p><b>(2)前沿学术热点</b></p><p>多工位协同装配的公差累积优化（解决复杂机器人装配误差叠加问题）基于数字孪生的公差分配动态优化（实时适配装配工况）超精密机器人装配的亚微米级公差控制</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 统计学（公差分析）、机械 × 优化理论、机械 × 数字孪生</p>
                <p><b>(4)代表研究</b></p><p>蔡司「工业机器人精密装配公差分析系统」、ABB「高精度关节装配工艺」，顶刊《Precision Engineering》</p>
                <h4>1.6.2 模块化机器人快速装配与无损拆卸技术</h4>
                <p><b>(1)核心研究内容</b></p><p>针对模块化机器人的快速部署与维护需求，设计快换接口、无损装配工艺，实现模块的快速拼接与拆卸，同时保证重复装配精度。</p>
                <p><b>(2)前沿学术热点</b></p><p>自锁紧快换接口设计（无需额外紧固件的模块化装配）机器人自主装配/拆卸技术（无人化模块更换）重复装配的精度保持技术（解决多次拆装的精度衰减）</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 控制（自主装配）、机械 × 材料（耐磨快换材料）</p>
                <p><b>(4)代表研究</b></p><p>波士顿动力「Atlas模块化关节快换技术」、CMU「模块化机器人自主装配系统」</p>
                <h4>1.6.3 刚柔混合结构装配工艺与精度保证方法</h4>
                <p><b>(1)核心研究内容</b></p><p>针对刚柔混合结构的装配难点，开展柔性部件的定位、夹持、装配工艺设计，解决柔性变形导致的装配精度失控问题。</p>
                <p><b>(2)前沿学术热点</b></p><p>柔性部件的力控装配工艺（避免装配过程的柔性变形）刚柔结合面的密封与精度补偿技术（如软体关节与刚性骨架装配）仿生机器人刚柔结构的仿生装配工艺（模拟生物生长的装配逻辑）</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 控制（力控装配）、机械 × 材料（刚柔界面材料）、机械 × 仿生学</p>
                <p><b>(4)代表研究</b></p><p>哈佛大学「软体机器人刚柔结合装配工艺」、丰田「仿人机器人柔性关节装配技术」</p>
                <h4>1.6.4 驱动-传动-传感一体化单元集成装配技术</h4>
                <p><b>(1)核心研究内容</b></p><p>针对机器人关节等核心单元，开展驱动、传动、传感元件的一体化集成装配，解决多元件集成的干涉、精度、可靠性问题。</p>
                <p><b>(2)前沿学术热点</b></p><p>无间隙集成装配工艺（消除驱动-传动-传感间的安装间隙）集成单元的热匹配装配（解决工作过程的热变形干涉）微型化集成单元的微装配技术（如微纳机器人关节）</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 电子（传感集成）、机械 × 热力学（热匹配）、机械 × 微纳制造</p>
                <p><b>(4)代表研究</b></p><p>特斯拉「人形机器人一体化关节装配工艺」、发那科「工业机器人集成关节装配技术」，顶刊《Robotics and Computer-Integrated Manufacturing》</p>
                <h4>1.6.5 装配过程误差建模、传递与在线补偿</h4>
                <p><b>(1)核心研究内容</b></p><p>建立机器人装配过程的误差模型，分析误差传递路径，设计在线检测与补偿方法，实时修正装配误差，提升最终装配精度。</p>
                <p><b>(2)前沿学术热点</b></p><p>多源误差耦合传递模型（考虑几何、热、力等多因素误差）基于机器视觉的装配误差在线检测与补偿（实时修正装配姿态）AI驱动的误差预测与主动补偿（提前预判误差并调整装配参数）</p>
                <p><b>(3)跨学科融合</b></p><p>机械 × 机器视觉、机械 × AI（误差预测）、机械 × 控制（主动补偿）</p>
                <p><b>(4)代表研究</b></p><p>清华大学「机器人装配误差传递建模与补偿」、三菱重工「工业机器人在线装配误差补偿系统」，顶会ICRA</p>
            </div>
            <div class="section-block" id="sec-2-0-p1">
                <h2>2 驱动与致动技术</h2>
                <h3>2.1 传统机电驱动与精密传动</h3><p class="core-position">机器人主流动力核心</p>
                <h4>2.1.1 高性能伺服电机驱动理论与设计</h4><p><b>(1)核心研究</b>永磁同步电机、无框力矩电机、空心杯电机的电磁设计、损耗建模、高精度转矩控制；低速大扭矩、高功率密度电机本体优化</p><p><b>(2)学术热点</b>面向人形机器人的高扭矩密度、轻量化关节电机低齿槽转矩、高线性度伺服驱动设计多物理场（电磁－热－结构）耦合优化设计</p><p><b>(3)跨学科融合</b>机械工程 × 电气工程 × 电磁学 × 热学</p>
                <h4>2.1.2 精密传动机构与新型减速器</h4><p><b>(1)核心研究</b>谐波减速器、RV减速器、行星传动的齿形优化、摩擦磨损、背隙补偿、刚度建模；微型/超薄型传动机构设计</p><p><b>(2)学术热点</b>零背隙、高刚性精密传动理论仿生柔性减速器、变刚度传动增材制造一体化传动结构</p><p><b>(3)跨学科融合</b>机构学 × 摩擦学 × 材料科学</p>
                <h4>2.1.3 直驱与分布式驱动技术</h4><p><b>(1)核心研究</b>无减速器直驱、模块式分布式关节驱动；多关节协同驱动的运动耦合与解耦</p><p><b>(2)学术热点</b>直驱关节的扰动观测与高精度控制全分布式驱动机器人动力学建模</p><p><b>(3)跨学科融合</b>控制理论 × 机电一体化 × 机器人动力学</p>
                <h3>2.2 流体驱动与气动/液压致动</h3><p class="core-position">重载、柔顺、大出力场景</p>
                <h4>2.2.1 气动驱动与柔性气动致动</h4><p><b>(1)核心研究</b>气动伺服控制、气动比例方向阀、气动人工肌肉（McKibben型）建模与控制；软体气动驱动器结构与压力响应特性</p><p><b>(2)学术热点</b>微型气动驱动与集成阀岛软体机器人多腔气动协同致动气动柔顺控制与人机交互安全</p><p><b>(3)跨学科融合</b>流体力学 × 控制工程 × 软体机械</p>
                <h4>2.2.2 液压驱动与伺服液压系统</h4><p><b>(1)核心研究</b>伺服液压控制、负载敏感控制、微型液压系统、抗污染液压驱动；重载机器人液压动力单元优化</p><p><b>(2)学术热点</b>轻量化集成式液压关节电液混合驱动与节能控制深海／极端环境耐压液压致动</p><p><b>(3)跨学科融合</b>流体传动 × 控制理论 × 海洋工程／特种工程</p>
                <h4>2.2.3 气液混合驱动与复合致动</h4><p><b>(1)核心研究</b>气液转换驱动、高速-大推力复合动力；兼顾气动柔顺与液压刚性的混合致动</p><p><b>(2)学术热点</b>新型复合动力单元、多模式切换驱动</p>
                <h3>2.3 智能材料致动技术</h3><p class="core-position">柔性／软体机器人核心动力，当前最热科研方向</p>
                <h4>2.3.1 介电弹性体致动（DEA）</h4><p><b>(1)核心研究</b>DEA电场-力学耦合建模、大变形非线性动力学、失效机理；轻质高速柔性驱动器</p><p><b>(2)学术热点</b>自修复DEA致动 全软体DEA机器人驱动 低电压柔性DEA驱动</p><p><b>(3)跨学科融合</b>材料科学 × 电介质物理 × 柔性电子</p>
                <h4>2.3.2 形状记忆合金／聚合物（SMA/SMP）致动</h4><p><b>(1)核心研究</b>热-力耦合相变模型、响应速度提升、疲劳寿命优化；微型、连续体驱动</p><p><b>(2)学术热点</b>仿生SMA肌肉阵列 4D打印SMP可编程致动 低温响应型形状记忆致动</p><p><b>(3)跨学科融合</b>材料物理 × 化学材料 × 仿生机械</p>
                <h4>2.3.3 压电致动与精密微位移驱动</h4><p><b>(1)核心研究</b>压电陶瓷、压电薄膜、压电纤维的静动态建模；纳米级精密定位、超声电机</p><p><b>(2)学术热点</b>压电惯性驱动、尺蠖驱动 高频响微操作机器人致动 压电-柔性结构耦合驱动</p><p><b>(3)跨学科融合</b>固体力学 × 精密工程 × MEMS</p>
                <h4>2.3.4 离子型电活性聚合物致动（IPMC）</h4><p><b>(1)核心研究</b>离子传输动力学、水合效应、低电压驱动；水下、生物兼容驱动</p>
                <h4>2.3.5 磁致伸缩/磁流变/磁驱动致动</h4><p><b>(1)核心研究</b>超磁致伸缩材料（GMM）、磁流变液阻尼驱动；磁场控制无缆致动</p><p><b>(2)学术热点</b>磁控软体微型机器人 可变刚度磁流变关节</p><p>跨学科融合：电磁学 × 软物质物理</p>
                <h4>2.3.6 水凝胶与刺激响应型致动</h4><p><b>(1)核心研究</b>pH/温度/光响应水凝胶驱动；溶胀-收缩动力学、生物兼容驱动</p><p><b>(2)学术热点</b>可降解医疗微型机器人驱动</p>
                <h3>2.4 仿生肌肉与生物启发致动</h3><p class="core-position">具身智能、人形机器人核心方向</p>
                <h4>2.4.1 绳驱/腱驱仿生肌肉系统</h4><p><b>(1)核心研究</b>仿生骨骼肌的腱驱布局、力分配策略、可变刚度设计；多绳协同驱动建模</p><p><b>(2)学术热点</b>仿人体肌肉群的分布式绳驱 绳驱冗余驱动优化与抗松弛</p><p><b>(3)跨学科融合</b>生物力学 × 机器人控制 × 仿生学</p>
                <h4>2.4.2 可变刚度致动（VSA）与柔性关节</h4><p><b>(1)核心研究</b>串联弹性驱动（SEA）、并联弹性驱动（PEA）、可变刚度关节理论；安全人机交互</p><p><b>(2)学术热点</b>自适应刚度调节 能量回收型弹性致动 碰撞安全与柔顺交互</p><p><b>(3)跨学科融合</b>控制理论 × 人机交互（HRI）</p>
                <h4>2.4.3 仿生多自由度肌肉阵列致动</h4><p><b>(1)核心研究</b>多束肌肉协同驱动、拮抗驱动机制；仿生物运动的动力分配</p><p><b>(2)学术热点</b>类人躯干、颈部肌肉驱动系统</p>
                <h3>2.5 微纳尺度致动技术</h3><p class="core-position">微纳机器人、精密操作</p>
                <h4>2.5.1 MEMS微致动</h4><p><b>(1)核心研究</b>静电驱动、电磁驱动、热驱动微结构；芯片级微操作机器人</p><p><b>(2)学术热点</b>MEMS微夹钳、细胞操作微致动</p>
                <h4>2.5.2 光控/磁控/声控无缆微纳致动</h4><p><b>(1)核心研究</b>外场驱动微纳机器人动力学、集群运动控制</p><p><b>(2)学术热点</b>磁控螺旋微机器人 光驱动微型软体机器人</p><p><b>(3)跨学科融合</b>微纳机电 × 生物医学 × 物理学</p>
                <h4>2.5.3 微流体致动</h4><p>核心研究：芯片内微流体驱动、气泡驱动、毛细管力驱动</p>
                <h3>2.6 新型能量驱动与自供能致动</h3><p class="core-position">绿色机器人、长时自主</p>
                <h4>2.6.1 能量收集型致动</h4><p><b>(1)核心研究</b>压电/摩擦/热电能量收集与驱动一体化；自供能无线驱动</p><p><b>(2)学术热点</b>环境能量回收驱动软体机器人</p>
                <h4>2.6.2 无线传能驱动技术</h4><p><b>(1)核心研究</b>磁感应无线传能、微波传能；无缆机器人持续驱动</p><p><b>(2)学术热点</b>体内医疗机器人无线供能驱动</p>
                <h4>2.6.3 化学能/生物能致动</h4><p><b>(1)核心研究</b>燃料电池驱动、催化反应驱动、生物燃料驱动</p><p><b>(2)学术热点</b>长航时微型机器人化学动力</p>
                <h3>2.7 驱动系统集成、协同与能效优化</h3>
                <h4>2.7.1 多源驱动协同控制</h4><p><b>(1)核心研究</b>电-气-磁-智能材料混合驱动协调；多执行器动态分配</p><p><b>(2)学术热点</b>具身智能混合驱动系统</p>
                <h4>2.7.2 驱动-结构-控制一体化设计</h4><p><b>(1)核心研究</b>从结构刚度、质量分布出发优化驱动参数；动力学逆优化</p><p><b>(2)学术热点</b>AI辅助驱动-结构联合优化</p>
                <h4>2.7.3 驱动系统能效与热管理</h4><p><b>(1)核心研究</b>关节损耗建模、动态能耗最小化、再生制动；高密度驱动散热</p><p><b>(2)学术热点</b>人形机器人全身能效优化</p>
                <h4>2.7.4 驱动故障诊断与容错控制</h4><p><b>(1)核心研究</b>执行器故障检测、观测器设计、容错轨迹重构</p><p><b>(2)学术热点</b>空间/特种机器人冗余驱动容错</p>
            </div>
            <div class="section-block" id="sec-3-0-p1">
                <h2>3 硬件集成与可靠性</h2>
                <h3>3.1 机器人硬件系统集成设计</h3>
                <h4>3.1.1 模块化硬件架构与标准化接口设计</h4><p><b>(1)核心研究</b>硬件功能模块划分（感知／驱动／计算／通信）、电气与机械接口标准化、即插即用硬件架构；分布式硬件拓扑设计</p><p><b>(2)学术热点</b>人形机器人全身硬件模块化与快速重构机器人硬件接口通用协议与兼容设计面向多场景的可组合硬件平台</p><p><b>(3)跨学科融合</b>机械工程 × 电子工程 × 嵌入式系统</p>
                <h4>3.1.2 异构硬件协同与一体化集成</h4><p><b>(1)核心研究</b>多类型传感器、执行器、计算单元、通信模块的协同布局；硬件资源调度与总线优化</p><p><b>(2)学术热点</b>传感－驱动－计算共址集成硬件设计软硬一体化的低延迟硬件系统微型机器人片上系统（SoC）集成</p><p><b>(3)跨学科融合</b>电子信息 × 嵌入式系统 × 机器人系统工程</p>
                <h4>3.1.3 边缘计算硬件与算力集成</h4><p><b>(1)核心研究</b>端侧AI芯片、FPGA、ASIC在机器人硬件中的部署；算力分配与硬件加速架构</p><p><b>(2)学术热点</b>具身智能端侧大模型推理硬件集成低功耗高能效比机器人计算硬件多芯片异构算力互联</p><p><b>(3)跨学科融合</b>计算机体系结构 × 人工智能 × 嵌入式系统</p>
                <h4>3.1.4 高密度与小型化硬件集成</h4><p><b>(1)核心研究</b>微型化关节硬件、片上集成系统、高密度布线与结构复用；空间约束下的硬件布局优化</p><p><b>(2)学术热点</b>微纳机器人硬件系统集成可穿戴／医疗机器人超薄硬件设计人形机器人紧凑关节集成</p><p><b>(3)跨学科融合</b>MEMS × 精密机械 × 电子封装</p>
                <h4>3.1.5 供配电与能量系统硬件集成</h4><p><b>(1)核心研究</b>电池管理系统（BMS）、电源拓扑、多路供电分配、能量回收硬件；高低压隔离与安全供电</p><p><b>(2)学术热点</b>高倍率放电硬件与热失控防护无线充电与能量收集硬件集成长续航机器人分布式供电架构</p><p><b>(3)跨学科融合</b>电气工程 × 能源工程 × 材料科学</p>
                <h4>3.1.6 多物理场硬件集成设计</h4><p><b>(1)核心研究</b>热-电-磁-结构耦合下的硬件布局；电磁干扰抑制、散热通道与结构一体化设计</p><p><b>(2)学术热点</b>高密度关节多物理场协同优化 硬件集成中的热管理与减振一体化</p><p><b>(3)跨学科融合</b>传热学 × 电磁学 × 结构力学</p>
                <h3>3.2 硬件可靠性设计理论与方法</h3>
                <h4>3.2.1 可靠性建模与统计分析</h4><p><b>(1)核心研究</b>威布尔分布、失效率模型、蒙特卡洛仿真；硬件寿命建模、应力-强度干涉模型</p><p><b>(2)学术热点</b>数据驱动的机器人硬件可靠性建模 多物理场耦合下的可靠性量化分析 全生命周期可靠性演化模型</p><p><b>(3)跨学科融合</b>可靠性数学 × 统计学 × 机器学习</p>
                <h4>3.2.2 鲁棒硬件与冗余可靠性设计</h4><p><b>(1)核心研究</b>硬件冗余拓扑（传感器冗余、驱动冗余、计算冗余）、容错硬件架构；最坏情况设计</p><p><b>(2)学术热点</b>人形机器人关键部件冗余设计 低成本高鲁棒性硬件方案 功能冗余与硬件重构机制</p><p><b>(3)跨学科融合</b>控制理论 × 系统工程 × 安全工程</p>
                <h4>3.2.3 电磁兼容（EMC）与抗干扰设计</h4><p><b>(1)核心研究</b>电磁干扰抑制、屏蔽设计、接地与布线优化；硬件在复杂电磁环境下的稳定性</p><p><b>(2)学术热点</b>多电机驱动系统电磁兼容设计 高频通信与传感硬件抗干扰</p><p><b>(3)跨学科融合</b>电磁学 × 电子工程 × 通信工程</p>
                <h4>3.2.4 硬件误差、漂移与补偿设计</h4><p><b>(1)核心研究</b>传感器温漂、时漂、非线性误差；驱动硬件死区、间隙与精度退化；硬件级误差补偿</p><p><b>(2)学术热点</b>自适应硬件误差自校准 极端环境下硬件参数漂移抑制</p><p><b>(3)跨学科融合</b>精密测量 × 自动控制 × 信号处理</p>
                <h4>3.2.5 材料与工艺可靠性设计</h4><p><b>(1)核心研究</b>元器件选型、焊点可靠性、封装工艺、防腐耐磨设计；结构件疲劳与老化机理</p><p><b>(2)学术热点</b>长寿命机器人硬件材料筛选 增材制造硬件可靠性验证</p><p><b>(3)跨学科融合</b>材料科学 × 机械制造 × 腐蚀工程</p>
                <h3>3.3 硬件故障诊断、健康监测与自愈</h3>
                <h4>3.3.1 硬件在线故障诊断</h4><p><b>(1)核心研究</b>元器件级故障检测（开路／短路／漂移）、观测器设计、阈值判断与模式识别</p><p><b>(2)学术热点</b>基于AI的硬件故障快速诊断 端侧实时故障检测算法硬件化</p><p><b>(3)跨学科融合</b>信号处理 × 机器学习 × 控制理论</p>
                <h4>3.3.2 硬件健康监测（PHM）</h4><p><b>(1)核心研究</b>剩余使用寿命（RUL）预测、状态评估、退化轨迹跟踪；多源数据融合监测</p><p><b>(2)学术热点</b>数字孪生驱动的硬件健康监测 关键关节与电机健康管理</p><p><b>(3)跨学科融合</b>工业大数据 × 可靠性工程 × 数字孪生</p>
                <h4>3.3.3 硬件容错与动态重构</h4><p><b>(1)核心研究</b>故障后硬件通路切换、冗余部件启用、控制律重构；不中断任务的硬件容错机制</p><p><b>(2)学术热点</b>空间／特种机器人硬件容错系统分布式硬件自主重构</p><p><b>(3)跨学科融合</b>控制理论 × 嵌入式系统 × 智能决策</p>
                <h4>3.3.4 自修复硬件与智能集成</h4><p><b>(1)核心研究</b>自修复导电材料、可重构电路、自适应连接；硬件损伤后的自主恢复</p><p><b>(2)学术热点</b>自修复柔性传感／驱动硬件极端环境自修复机器人本体</p><p><b>(3)跨学科融合</b>智能材料 × 电子工程 × 仿生工程</p>
                <h3>3.4 极端环境硬件可靠性与适配设计</h3>
                <h4>3.4.1 空间／高低温／辐照硬件可靠性</h4><p><b>(1)核心研究</b>真空适应性、高低温循环、宇宙辐照防护；硬件抗老化与抗脆断设计</p><p><b>(2)学术热点</b>星载/深空机器人硬件可靠性 极端温度硬件补偿机制</p><p><b>(3)跨学科融合</b>航天工程 × 核物理 × 材料科学</p>
                <h4>3.4.2 深海耐压与密封硬件设计</h4><p><b>(1)核心研究</b>万米级耐压结构、水密连接器、压力补偿系统；腐蚀防护与绝缘可靠性</p><p><b>(2)学术热点</b>深海作业机器人硬件密封设计 海洋环境长时可靠性</p><p><b>(3)跨学科融合</b>海洋工程 × 力学 × 材料工程</p>
                <h4>3.4.3 防尘、防水、防爆硬件设计</h4><p><b>(1)核心研究</b>IP等级防护、本安型电路、隔爆设计；煤矿、化工、消防场景硬件安全</p><p><b>(2)学术热点</b>防爆机器人硬件系统认证设计 复杂粉尘/潮湿环境硬件防护</p><p><b>(3)跨学科融合</b>安全工程 × 电气工程 × 化工工程</p>
                <h4>3.4.4 强振动与冲击环境硬件可靠性</h4><p><b>(1)核心研究</b>抗振结构、缓冲设计、硬件抗冲击加固；车载、飞行、抛投场景可靠性</p><p><b>(2)学术热点</b>高机动机器人硬件抗振优化 冲击下硬件失效机理与防护</p><p><b>(3)跨学科融合</b>振动工程 × 结构力学 × 机械设计</p>
            </div>
            <div class="section-block" id="sec-4-0-p1">
                <h2>4 材料科学应用</h2>
                <h3>4.1 结构承载与轻量化高性能结构材料</h3>
                <h4>4.1.1 高比强度结构合金与金属基材料</h4><p><b>(1)核心研究</b>铝锂合金、钛合金、高强钢在机器人连杆／机架／关节壳体的应用；轻量化与结构强度匹配、成型工艺优化</p><p><b>(2)学术热点</b>人形／四足机器人轻量化高刚度金属材料选型纳米增强金属基复合材料强韧化机理薄壁复杂结构金属材料疲劳性能优化</p><p><b>(3)跨学科融合</b>机械结构设计 × 材料力学 × 金属材料工程</p>
                <h4>4.1.2 纤维增强复合材料</h4><p><b>(1)核心研究</b>碳纤维／玻璃纤维／芳纶增强树脂基复合材料；层铺设计、各向异性力学性能、轻量化拓扑优化匹配</p><p><b>(2)学术热点</b>连续纤维增强机器人结构一体化制备复合材料结构阻尼与减振特性设计低成本高性能复合材料批量化应用</p><p><b>(3)跨学科融合</b>机构学 × 复合材料力学 × 制造工程</p>
                <h4>4.1.3 高性能工程塑料与改性高分子材料</h4><p><b>(1)核心研究</b>PEEK、PPS、工程尼龙等在机器人减速器、支架、外壳的应用；耐磨、减摩、轻量化改性</p><p><b>(2)学术热点</b>玻纤／碳粉填充高分子耐磨材料精密传动部件高分子材料摩擦学设计</p><p><b>(3)跨学科融合</b>摩擦学 × 高分子材料 × 机械传动</p>
                <h3>4.2 柔性与软体机器人基体材料</h3>
                <h4>4.2.1 高弹性软体驱动基体材料</h4><p><b>(1)核心研究</b>硅胶（Ecoflex、Dragon Skin）、热塑性弹性体、柔性聚氨酯；大变形、抗撕裂、疲劳寿命优化</p><p><b>(2)学术热点</b>气动／液压软体机器人专用高弹性材料可变刚度软体基体材料抗疲劳软材料本构模型与失效机理</p><p><b>(3)跨学科融合</b>软体机械 × 软物质物理 × 高分子材料</p>
                <h4>4.2.2 柔性可拉伸封装与结构材料</h4><p><b>(1)核心研究</b>可拉伸薄膜、柔性基底、柔性封装胶；适配柔性传感器／驱动器的力学匹配与防护</p><p><b>(2)学术热点</b>高延展性低模量柔性结构材料多层柔性材料界面结合强度设计</p><p><b>(3)跨学科融合</b>柔性电子 × 材料表面工程</p>
                <h4>4.2.3 刚柔混合梯度材料</h4><p><b>(1)核心研究</b>刚性－柔性功能梯度材料；解决软体机器人承载力低、刚性机器人适应性差的矛盾</p><p><b>(2)学术热点</b>3D打印连续梯度刚柔复合结构材料仿生骨－肌梯度材料设计与制备</p><p><b>(3)跨学科融合</b>仿生机械 × 功能梯度材料 × 增材制造</p>
                <h3>4.3 智能响应与驱动传感一体化功能材料</h3>
                <h4>4.3.1 电活性智能致动材料</h4><p><b>(1)核心研究</b>介电弹性体（DEA）、离子聚合物金属复合材料（IPMC）、压电薄膜；电－力耦合响应特性、大变形优化</p><p><b>(2)学术热点</b>低电压驱动柔性电致动材料 自传感电活性致动材料 软体机器人阵列式致动材料集成</p><p><b>(3)跨学科融合</b>智能驱动 × 电介质物理 × 材料物理</p>
                <h4>4.3.2 热／光／磁响应型智能材料</h4><p><b>(1)核心研究</b>形状记忆合金（SMA）、形状记忆聚合物（SMP）、磁响应软材料、光响应凝胶；外场刺激变形机理</p><p><b>(2)学术热点</b>4D打印可编程形状记忆材料无缆磁控软体机器人功能材料 低温快速响应SMA/SMP材料</p><p><b>(3)跨学科融合</b>仿生驱动 × 凝聚态物理 × 化学材料</p>
                <h4>4.3.3 自感知传感功能材料</h4><p><b>(1)核心研究</b>压阻／电容／压电柔性传感材料、离子导电水凝胶、液态金属复合材料；力／触觉／应变传感特性</p><p><b>(2)学术热点</b>高灵敏度机器人电子皮肤材料 宽量程抗干扰柔性传感材料 传感-结构一体化复合材料</p><p><b>(3)跨学科融合</b>机器人感知 × 柔性电子 × 材料传感机理</p>
                <h3>4.4 仿生界面与人机交互功能材料</h3>
                <h4>4.4.1 仿生黏附与摩擦界面材料</h4><p><b>(1)核心研究</b>仿壁虎刚毛、仿章鱼吸盘、仿生防滑摩擦材料；非光滑表面界面力学设计</p><p><b>(2)学术热点</b>爬壁／攀爬机器人可逆黏附材料可控摩擦仿生界面材料</p><p><b>(3)跨学科融合</b>生物力学 × 界面物理 × 仿生材料</p>
                <h4>4.4.2 仿生减阻与流体适配材料</h4><p><b>(1)核心研究</b>仿鲨鱼皮、仿鱼鳍减阻材料；水下／空中机器人流体力学适配</p><p><b>(2)学术热点</b>水下机器人超疏水减阻材料微型扑翼机器人低风阻表面材料</p><p><b>(3)跨学科融合</b>流体力学 × 仿生学 × 表面工程</p>
                <h4>4.4.3 柔性穿戴与人体适配材料</h4><p><b>(1)核心研究</b>亲肤、透气、无刺激柔性材料；外骨骼、康复机器人人体工学适配</p><p><b>(2)学术热点</b>可穿戴机器人柔性衬垫材料人机耦合柔性缓冲材料</p><p><b>(3)跨学科融合</b>生物医学工程 × 人机交互 × 纺织材料</p>
                <h3>4.5 极端环境服役特种防护材料</h3>
                <h4>4.5.1 耐高低温与热防护材料</h4><p><b>(1)核心研究</b>耐高温硅胶、隔热陶瓷、相变材料；消防、工业高温机器人热防护</p><p><b>(2)学术热点</b>柔性耐高温隔热复合薄膜 关节热管理相变储能材料</p><p><b>(3)跨学科融合</b>热学工程 × 防护材料 × 极端环境机器人</p>
                <h4>4.5.2 深海耐压与防腐密封材料</h4><p><b>(1)核心研究</b>深海耐压弹性体、防腐涂层、水密密封材料；海洋机器人长效防腐密封</p><p><b>(2)学术热点</b>万米级深海机器人耐压软材料 海洋高盐环境长效防腐涂层</p><p><b>(3)跨学科融合</b>海洋工程 × 腐蚀与防护材料 × 密封工程</p>
                <h4>4.5.3 抗辐照与空间特种材料</h4><p><b>(1)核心研究</b>耐宇宙辐照高分子、抗原子氧材料、真空防逸散材料；空间机器人服役适配</p><p><b>(2)学术热点</b>空间可展开机构柔性耐辐照材料 深空探测机器人极端温度适配材料</p><p><b>(3)跨学科融合</b>航天工程 × 核材料 × 空间环境工程</p>
                <h4>4.5.4 防尘防爆与安全防护材料</h4><p><b>(1)核心研究</b>阻燃、防爆、防尘密封材料；煤矿、化工、消防场景安全适配</p><p><b>(2)学术热点</b>本安型机器人阻燃柔性材料 粉尘环境自清洁表面材料</p><p><b>(3)跨学科融合</b>安全工程 × 功能防护材料</p>
                <h3>4.6 生物兼容与医疗机器人专用材料</h3>
                <h4>4.6.1 医用级生物兼容材料</h4><p><b>(1)核心研究</b>医用硅胶、聚乳酸（PLA）、聚己内酯（PCL）；手术、介入机器人生物安全性</p><p><b>(2)学术热点</b>微创医疗机器人柔性生物兼容材料低异物反应植入式机器人材料</p><p><b>(3)跨学科融合</b>临床医学 × 生物材料 × 医疗机器人</p>
                <h4>4.6.2 可降解与环境友好材料</h4><p><b>(1)核心研究</b>可降解高分子、天然高分子基材料；体内诊疗微纳机器人可控降解</p><p><b>(2)学术热点</b>时序可控降解医疗机器人材料无残留可降解软体微型机器人材料</p><p><b>(3)跨学科融合</b>生物医学 × 降解材料化学 × 微纳机器人</p>
                <h4>4.6.3 细胞与组织适配材料</h4><p><b>(1)核心研究</b>水凝胶、细胞亲和性材料；生物混合机器人、组织工程机器人</p><p><b>(2)学术热点</b>活细胞、机器融合生物兼容材料仿生组织柔性水凝胶材料</p><p><b>(3)跨学科融合</b>生物工程 × 软物质材料 × 医疗微操作机器人</p>
                <h3>4.7 能量存储与收集功能材料</h3>
                <h4>4.7.1 高功率密度电池材料</h4><p><b>(1)核心研究</b>固态电池、锂聚合物电池材料；机器人轻量化高能量密度供电</p><p><b>(2)学术热点</b>柔性可变形电池基底材料 人形机器人高倍率放电电极材料</p><p><b>(3)跨学科融合</b>能源材料 × 电池工程 × 机器人供能系统</p>
                <h4>4.7.2 能量收集与转换材料</h4><p><b>(1)核心研究</b>压电、摩擦电、热电、光电转换材料；机器人环境自供能</p><p><b>(2)学术热点</b>柔性压电－摩擦复合发电材料 可穿戴／软体机器人自供能材料</p><p><b>(3)跨学科融合</b>能源工程 × 功能材料 × 自供能系统</p>
                <h4>4.7.3 柔性超级电容材料</h4><p><b>(1)核心研究</b>碳纳米管、石墨烯基柔性电极材料；机器人瞬时大功率供能</p><p><b>(2)学术热点</b>结构－储能一体化复合骨架材料 可拉伸柔性超级电容材料</p><p><b>(3)跨学科融合</b>储能材料 × 机电集成</p>
                <h3>4.8 增材制造与先进结构功能材料</h3>
                <h4>4.8.1 3D打印专用机器人结构材料</h4><p><b>(1)核心研究</b>金属3D打印粉末、光敏树脂、连续纤维增强打印材料；适配复杂拓扑结构</p><p><b>(2)学术热点</b>点阵／晶格结构专用轻质打印材料 多材料3D打印梯度功能材料</p><p><b>(3)跨学科融合</b>增材制造 × 结构设计 × 材料成型</p>
                <h4>4.8.2 4D打印智能变形材料</h4><p><b>(1)核心研究</b>刺激响应型打印材料、预应变编程材料；打印后自主变形机器人结构</p><p><b>(2)学术热点</b>多场响应4D打印软体机器人材料可重构机器人自变形材料</p><p><b>(3)跨学科融合</b>智能材料 × 先进制造 × 可重构机构</p>

            <div class="section-block">
                <h2>3 传感器融合</h2>
                <h3>3.1 融合层级与数据表征</h3>
                <h4>3.1.1 数据级融合（原始信号级融合）</h4><p><b>(1)核心研究内容</b>原始传感器数据对齐（时间／空间同步）、信号预处理与噪声抑制、多源原始数据直接融合、异构数据格式统一（点云／图像／IMU/力信号）、数据级冗余信息剔除。</p><p><b>(2)前沿学术热点</b>跨传感器采样频率自适应同步（如激光10Hz+相机30Hz+IMU 200Hz）原始信号级深度学习融合（端到端原始数据输入）事件相机-传统相机原始数据融合数据级融合的硬件加速(FPGA/ASIC实现)</p><p><b>(3)跨学科融合</b>信号处理 × 嵌入式系统 × 计算机体系结构</p><p><b>(4)代表研究</b>苏黎世联邦理工：事件-帧原始数据融合深度估计，CVPR 2023清华大学：激光-视觉原始点云-像素对齐融合，ICRA 2024卡内基梅隆大学：IMU-视觉原始信号紧耦合融合，IEEE TRO 2023</p>
                <h4>3.1.2 特征级融合（中间表示级融合）</h4><p><b>(1)核心研究内容</b>多模态特征提取、特征对齐与匹配、跨模态特征转换、特征级信息互补、深度特征融合网络设计。</p><p><b>(2)前沿学术热点</b>Transformer-based跨模态特征融合（如BEVFormer、Fusion-Mamba）稀疏-稠密特征融合（激光稀疏点云+视觉稠密图像）特征级不确定性建模与传播轻量化特征融合网络（适配端侧机器人）</p><p><b>(3)跨学科融合</b>深度学习 × 计算机视觉 × 模式识别</p><p><b>(4)代表研究</b>上海交通大学：多流网络激光-视觉特征融合3D检测（MuSTD），IROS 2025（SOTA）谷歌DeepMind：RT-2视觉-语言-动作特征融合，Science Robotics 2023南洋理工大学：Fusion-Mamba门控机制特征融合，CVPR 2025（推理速度提升2.7倍）</p>
                <h4>3.1.3 决策级融合（结果级融合）</h4><p><b>(1)核心研究内容</b>多源感知结果一致性校验、决策权重自适应分配、冲突证据处理、贝叶斯推理融合、D-S证据理论应用、决策级鲁棒性提升。</p><p><b>(2)前沿学术热点</b>多模态决策融合的可解释性增强传感器失效时的决策级自适应降级大语言模型辅助决策级融合（语义一致性校验）决策级融合的实时性优化（毫秒级推理）</p><p><b>(3)跨学科融合</b>人工智能 × 决策理论 × 可靠性工程</p><p><b>(4)代表研究</b>微软：多模态决策融合的不确定性量化，ICRA 2024 加州理工：基于贝叶斯推理的决策级融合，IEEE TRO 2023 北京大学：LLM辅助机器人多模态决策融合，IROS 2025</p>

                <h3>3.2 融合算法与数学基础学术方向</h3>

        // ==================== 导航逻辑 ====================
        let currentPage = 'page-home';

        function navigateTo(pageId, pageTitle) {
            currentPage = pageId;
            // 隐藏所有页面
            document.querySelectorAll('#mainContent > div').forEach(div => {
                div.style.display = 'none';
            });
            // 显示目标页面
            const targetDiv = document.getElementById(pageId);
            if (targetDiv) {
                targetDiv.style.display = 'block';
                // 如果跳转到子页面，填充内容
                if (pageId !== 'page-home' && pageContents[pageId]) {
                    targetDiv.innerHTML = pageContents[pageId];
                }
            }
            // 更新面包屑
            const breadcrumb = document.getElementById('breadcrumb');
            if (pageId === 'page-home') {
                breadcrumb.innerHTML = '<span class="current">首页</span>';
                document.getElementById('mainContent').classList.add('full-width');
                document.getElementById('sidebar').classList.add('hidden');
            } else {
                breadcrumb.innerHTML =
                    '<a onclick="navigateTo(\'page-home\',\'首页\')">首页</a> <span class="sep">›</span> <span class="current">' +
                    pageTitle + '</span>';
                document.getElementById('mainContent').classList.remove('full-width');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('sidebarTitle').textContent = pageTitle;
                // 重建侧边栏
                buildSidebarForPage(pageId);
            }
            // 滚动到顶部
            document.getElementById('mainContent').scrollTop = 0;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            // 更新URL hash
            window.location.hash = pageId;
        }

        function buildSidebarForPage(pageId) {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = '';
            const container = document.getElementById(pageId);
            if (!container) return;
            // 等待内容渲染
            setTimeout(() => {
                const headings = container.querySelectorAll('h2, h3, h4');
                headings.forEach((h, index) => {
                    const text = h.textContent.trim();
                    const tag = h.tagName.toLowerCase();
                    let levelClass = 'level-h4';
                    if (tag === 'h2') levelClass = 'level-h2';
                    else if (tag === 'h3') levelClass = 'level-h3';
                    // 确保有id
                    if (!h.id) {
                        h.id = 'sub-' + pageId + '-' + index;
                    }
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.textContent = text;
                    a.href = '#' + h.id;
                    a.className = levelClass;
                    a.addEventListener('click', function(e) {
                        e.preventDefault();
                        document.getElementById(h.id).scrollIntoView({ behavior: 'smooth', block: 'start' });
                        nav.querySelectorAll('a').forEach(el => el.classList.remove('active-nav'));
                        a.classList.add('active-nav');
                    });
                    li.appendChild(a);
                    nav.appendChild(li);
                });
            }, 100);
        }

        // Logo点击返回首页
        document.getElementById('logoLink').addEventListener('click', function() {
            navigateTo('page-home', '首页');
        });

        // 侧边栏切换按钮
        document.getElementById('menuToggle').addEventListener('click', function() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('hidden')) return;
            sidebar.classList.toggle('collapsed');
        });

        // 处理浏览器前进/后退
        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.replace('#', '');
            if (hash && (hash === 'page-home' || hash === 'page-1' || hash === 'page-2' || hash === 'page-3' ||
                    hash === 'page-4')) {
                const titles = {
                    'page-home': '首页',
                    'page-1': '一、机械结构与硬件系统',
                    'page-2': '二、感知系统',
                    'page-3': '三、决策与控制系统',
                    'page-4': '四、交互与协同系统'
                };
                navigateTo(hash, titles[hash] || '');
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            const hash = window.location.hash.replace('#', '');
            if (hash && (hash === 'page-1' || hash === 'page-2' || hash === 'page-3' || hash === 'page-4')) {
                const titles = {
                    'page-1': '一、机械结构与硬件系统',
                    'page-2': '二、感知系统',
                    'page-3': '三、决策与控制系统',
                    'page-4': '四、交互与协同系统'
                };
                navigateTo(hash, titles[hash] || '');
            } else {
                navigateTo('page-home', '首页');
            }
        });
    </script>
